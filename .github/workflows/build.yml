name: Build and test

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        target: ["cpu"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v6
        with:
          path: |
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "check-${{ github.job }}-${{ hashFiles('Cargo.lock') }}"
          restore-keys: |
            check-${{ github.job }}-
            check-

      - name: Check
        run: cargo check --features ${{ matrix.target }}

  lint:
    strategy:
      matrix:
        target: ["cpu"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v6
        with:
          path: |
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "lint-${{ github.job }}-${{ hashFiles('Cargo.lock') }}"
          restore-keys: |
            lint-${{ github.job }}-
            lint-
            check-${{ github.job }}-
            check-

      - name: Lint
        run: cargo clippy --features ${{ matrix.target }} -- -D warnings

      - name: Format
        run: cargo fmt --check

  build:
    strategy:
      matrix:
        target: ["cpu"]
    needs: [check, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        id: build-artifacts
        uses: actions/cache@v6
        with:
          path: |
            target/
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: "build-${{ github.job }}-${{ hashFiles('Cargo.lock') }}"
          restore-keys: |
            lint-${{ github.job }}-
            lint-
            build-${{ github.job }}-
            build-

      - name: Build
        run: cargo build --locked --release --features ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: marble-ner
          path: target/release/ner
          retention-days: 7
